# edu_rag v2.0 — 全栈部署
# 一键启动: docker compose -f docker/docker-compose.yml up -d

version: "3.9"

services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - MYSQL__HOST=mysql
      - MYSQL__PORT=3306
      - MYSQL__USER=root
      - MYSQL__PASSWORD=${MYSQL_PASSWORD:?必须设置 MYSQL_PASSWORD 环境变量}
      - MYSQL__DATABASE=edu_rag
      - REDIS__HOST=redis
      - REDIS__PORT=6379
      - REDIS__PASSWORD=${REDIS_PASSWORD:?必须设置 REDIS_PASSWORD 环境变量}
      - VECTOR_STORE__PROVIDER=milvus
      - VECTOR_STORE__MILVUS_HOST=milvus
      - VECTOR_STORE__MILVUS_PORT=19530
      - EMBEDDING__PROVIDER=api
      - EMBEDDING__API_BASE_URL=http://ollama:11434/v1
      - EMBEDDING__MODEL=bge-m3
      - EMBEDDING__API_KEY=ollama
      - LLM__API_KEY=${OPENAI_API_KEY}
      - LLM__BASE_URL=${OPENAI_BASE_URL:-https://api.deepseek.com/v1}
      - LLM__MODEL=${LLM_MODEL:-deepseek-chat}
      - APP__API_KEY=${APP_API_KEY:-}
    volumes:
      - ../data:/app/data
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      milvus:
        condition: service_started
    restart: unless-stopped

  # ── ARQ 异步任务 worker（P1-C5：文档入库异步处理，单写消除 BM25 竞争）──
  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: ["arq", "src.orchestration.worker.config.WorkerSettings"]
    environment:
      - MYSQL__HOST=mysql
      - MYSQL__PORT=3306
      - MYSQL__USER=root
      - MYSQL__PASSWORD=${MYSQL_PASSWORD:?必须设置 MYSQL_PASSWORD 环境变量}
      - MYSQL__DATABASE=edu_rag
      - REDIS__HOST=redis
      - REDIS__PORT=6379
      - REDIS__PASSWORD=${REDIS_PASSWORD:?必须设置 REDIS_PASSWORD 环境变量}
      - VECTOR_STORE__PROVIDER=milvus
      - VECTOR_STORE__MILVUS_HOST=milvus
      - VECTOR_STORE__MILVUS_PORT=19530
      - EMBEDDING__PROVIDER=api
      - EMBEDDING__API_BASE_URL=http://ollama:11434/v1
      - EMBEDDING__MODEL=bge-m3
      - EMBEDDING__API_KEY=ollama
      - LLM__API_KEY=${OPENAI_API_KEY}
      - LLM__BASE_URL=${OPENAI_BASE_URL:-https://api.deepseek.com/v1}
      - LLM__MODEL=${LLM_MODEL:-deepseek-chat}
      - APP__ASYNC_INGESTION=true
    volumes:
      - ../data:/app/data
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      milvus:
        condition: service_started
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:?必须设置 MYSQL_PASSWORD 环境变量}
      MYSQL_DATABASE: edu_rag
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:?必须设置 REDIS_PASSWORD 环境变量}
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=24h
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        ollama serve &
        sleep 5
        ollama pull bge-m3
        wait
    restart: unless-stopped

  # ── Milvus 向量库（standalone：etcd + minio + milvus）──
  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcd_data:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - minio_data:/minio_data
    command: minio server /minio_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped

  milvus:
    image: milvusdb/milvus:v2.4.10
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - milvus_data:/var/lib/milvus
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      - etcd
      - minio
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      start_period: 90s
      timeout: 20s
      retries: 3
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data:
  ollama_data:
  etcd_data:
  minio_data:
  milvus_data:
