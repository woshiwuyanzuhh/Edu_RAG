# Redis 从节点配置（P0-DR3）
# 部署：docker-compose.cloud.yml 的 redis_slave 服务挂载此文件
#
# 作用：作为本地 Redis 主的从节点，实时复制数据。
#       主库故障时，Sentinel 自动将从提升为主。

# 复制配置（部署时通过环境变量替换）
# replicaof <master-host> <master-port>
replicaof redis_cloud 6379

# 主库密码
masterauth REDIS_PASSWORD_PLACEHOLDER

# 从库只读
replica-read-only yes

# 持久化：AOF + RDB 双保险
appendonly yes
appendfsync everysec
save 900 1
save 300 10
save 60 10000

# 从库优先级（Sentinel 选举时使用，数字越小优先级越高；0=永不提升为主）
replica-priority 100
