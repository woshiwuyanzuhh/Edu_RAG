# Redis Sentinel 配置（P2-D6 — 生产级）
# 部署：docker compose -f docker/docker-compose.cloud.yml up -d sentinel
#
# Sentinel 集群要求：
#   - 至少 3 个 sentinel 节点（奇数），quorum=2，避免脑裂
#   - 本配置为 docker-compose 内单 sentinel（适合开发/小规模）
#   - 生产建议跨节点部署 3 个 sentinel

# 监控主节点 mymaster（master-host:port:quorum）
# 注意：部署时需将 redis_cloud 替换为实际主库地址
sentinel monitor mymaster redis_cloud 6379 1

# 主观下线判定：5s 无响应判定为主观下线（SDOWN）
sentinel down-after-milliseconds mymaster 5000

# 故障转移超时：30s 内未完成则放弃
sentinel failover-timeout mymaster 30000

# 故障转移后并行同步从节点数（1 = 串行，降低切换期负载）
sentinel parallel-syncs mymaster 1

# 主节点密码（Redis 设了 requirepass，需配置）
# 部署时通过环境变量 REDIS_PASSWORD 自动替换
sentinel auth-pass mymaster REDIS_PASSWORD_PLACEHOLDER

# 哨兵自身密码（可选，保护 sentinel 管理命令）
# requirepass <sentinel-password>

# 通知脚本（故障转移时调用）
# sentinel notification-script mymaster /path/to/notify.sh

# 客户端重配置脚本（故障转移后通知客户端新主地址）
# sentinel client-reconfig-script mymaster /path/to/reconfig.sh
