# Redis Sentinel 配置（P2-D6）
# 部署：docker run -d --name sentinel -p 26379:26379 \
#       -v ./docker/redis/sentinel.conf:/etc/redis/sentinel.conf \
#       redis:7-alpine redis-sentinel /etc/redis/sentinel.conf
#
# 生产建议至少 3 个 sentinel 节点（奇数），quorum=2，避免单点。
# 本配置为单 sentinel 示例（quorum=1），适合开发/小规模。

# 监控主节点 mymaster（master-host:port:quorum）
sentinel monitor mymaster redis 6379 1

# 主观下线判定：5s 无响应判定为主观下线（SDOWN）
sentinel down-after-milliseconds mymaster 5000

# 故障转移超时：30s 内未完成则放弃
sentinel failover-timeout mymaster 30000

# 故障转移后并行同步从节点数（1 = 串行，降低切换期负载）
sentinel parallel-syncs mymaster 1

# 主节点密码（如 Redis 设了 requirepass，取消注释并填写）
# sentinel auth-pass mymaster <redis-password>

# 哨兵自身密码（可选，保护 sentinel 管理命令）
# requirepass <sentinel-password>
