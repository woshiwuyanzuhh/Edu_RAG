# edu_rag 容灾 Nginx 配置（P0-DR5）
#
# 部署在云服务器上，作为统一流量入口。
# 客户端 → 云服务器 IP:80 → Nginx → 本地（主）/ 云上备机（备）
#
# 工作原理：
#   1. 默认将所有流量转发到本地（primary）
#   2. Nginx 主动健康检查 /health 端点
#   3. 本地连续 3 次健康检查失败 → 自动切换到云上备机（backup）
#   4. 本地恢复后 → 自动切回本地
#
# 前置条件：
#   - 本地服务能被云服务器访问（需公网 IP 或内网穿透）
#   - 云上备机已通过 docker-compose.cloud.yml 启动
#
# 安装：
#   apt install nginx libnginx-mod-stream
#   # 或使用 Docker: 见 docker/nginx/Dockerfile
#
# 部署：
#   cp docker/nginx/nginx.conf /etc/nginx/nginx.conf
#   nginx -t && systemctl reload nginx
#
# 环境变量（部署时替换）：
#   LOCAL_HOST — 本地服务公网 IP
#   CLOUD_HOST — 云上备机地址（默认 127.0.0.1，因为 Nginx 和备机在同一台云服务器）

# ─── 全局 ───
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/json;
    access_log    /var/log/nginx/access.log;

    # ─── 代理缓冲优化 ───
    proxy_buffer_size       128k;
    proxy_buffers           4 256k;
    proxy_busy_buffers_size 256k;

    # 上传文件大小限制（与 app 的 max_upload_size_mb=50 对齐）
    client_max_body_size 50m;

    # SSE 流式响应：关闭缓冲，实时透传
    proxy_buffering off;
    proxy_cache off;

    # 超时设置（SSE 需要长超时）
    proxy_connect_timeout 5s;
    proxy_read_timeout    300s;
    proxy_send_timeout    300s;

    # ─── Upstream: 本地（主）───
    # backup 参数: 仅当 primary 不可用时才使用
    upstream edu_rag_backend {
        # 本地主节点（通过 frp 隧道访问）
        server edu_rag_frps:18000 max_fails=3 fail_timeout=15s;

        # 云上备机（backup: 仅当主不可用时启用）
        server docker-app-1:8000 backup max_fails=3 fail_timeout=15s;

        # 保留连接（减少握手开销）
        keepalive 32;
    }

    # ─── 健康检查端点（主动探活）───
    # Nginx 开源版不支持主动健康检查，通过被动检查（max_fails + fail_timeout）实现
    # 如需主动检查，安装 nginx-upstream-check-module 或用商业版 Nginx Plus

    # ─── HTTP 服务 ───
    server {
        listen 80;
        server_name _;

        # 安全头
        add_header X-Content-Type-Options nosniff;
        add_header X-Frame-Options SAMEORIGIN;

        # ─── 健康检查端点（Nginx 自身）───
        # 返回 Nginx + 后端状态
        location /nginx-health {
            access_log off;
            return 200 '{"status":"ok","nginx":true}';
            add_header Content-Type application/json;
        }

        # ─── API 代理 ───
        location /api/ {
            proxy_pass http://edu_rag_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # Nginx 注入 API Key，用户无需提供
            proxy_set_header X-API-Key CHANGE_ME_API_KEY;

            # 错误处理：后端不可用时返回 503
            error_page 502 503 504 = @backend_down;
        }

        # ─── SSE 流式端点（QA 流式问答）───
        # 需要特殊处理：长连接、关闭缓冲
        location /api/qa/stream {
            proxy_pass http://edu_rag_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # Nginx 注入 API Key
            proxy_set_header X-API-Key CHANGE_ME_API_KEY;

            # SSE 关键配置
            proxy_buffering off;       # 实时透传，不缓冲
            proxy_cache off;
            chunked_transfer_encoding on;

            # 长超时（流式问答可能持续较久）
            proxy_read_timeout 600s;
        }

        # ─── 健康检查端点代理 ───
        # Nginx 使用 /health/ready 做主动健康检查
        location /health {
            proxy_pass http://edu_rag_backend;
            access_log off;
        }

        location /health/live {
            proxy_pass http://edu_rag_backend;
            access_log off;
        }

        location /health/ready {
            proxy_pass http://edu_rag_backend;
            access_log off;
        }

        # ─── Prometheus metrics ───
        location /metrics {
            proxy_pass http://edu_rag_backend;
            access_log off;
        }

        # ─── 前端静态文件（SPA）───
        # 优先从云上备机的 app 获取（SPA fallback）
        location / {
            proxy_pass http://edu_rag_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-API-Key CHANGE_ME_API_KEY;
        }

        # ─── 后端全部不可用时的降级页面 ───
        location @backend_down {
            return 503 '{"success":false,"message":"服务暂时不可用，正在切换中...","code":"BACKEND_DOWN"}';
            add_header Content-Type application/json;
        }
    }
}
