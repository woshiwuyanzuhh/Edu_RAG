# edu_rag 云上备机部署（P1-D4）
#
# 用途：本地机房崩溃后，云 LB 将流量切到此处，承接生产流量。
# 前置条件：
#   1. 本地主库 → 云从库 MySQL 主从复制已配置（见 docker/mysql/master.cnf / slave.cnf）
#   2. 云 LB 健康检查指向本机 app:8000/health（探活 DB+Redis+向量库）
#   3. 环境变量 MYSQL_PASSWORD / REDIS_PASSWORD / OPENAI_API_KEY 已设置
#
# 启动: docker compose -f docker/docker-compose.cloud.yml up -d
# 注意：与本地 docker-compose.yml 端口错开（app=8100, mysql=3308, redis=6381, milvus=19531 冲突需注意）
#       生产建议云上独立主机，端口可与本地一致。

version: "3.9"

services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8100:8000"
    environment:
      - MYSQL__HOST=mysql_cloud
      - MYSQL__PORT=3306
      - MYSQL__USER=root
      - MYSQL__PASSWORD=${MYSQL_PASSWORD:?必须设置 MYSQL_PASSWORD 环境变量}
      - MYSQL__DATABASE=edu_rag
      - REDIS__HOST=redis_cloud
      - REDIS__PORT=6379
      - REDIS__PASSWORD=${REDIS_PASSWORD:?必须设置 REDIS_PASSWORD 环境变量}
      - VECTOR_STORE__MILVUS_HOST=milvus_cloud
      - VECTOR_STORE__MILVUS_PORT=19530
      - EMBEDDING__PROVIDER=api
      - EMBEDDING__API_BASE_URL=http://ollama_cloud:11434/v1
      - EMBEDDING__MODEL=bge-m3
      - EMBEDDING__API_KEY=ollama
      - LLM__API_KEY=${OPENAI_API_KEY}
      - LLM__BASE_URL=${OPENAI_BASE_URL:-https://api.deepseek.com/v1}
      - LLM__MODEL=${LLM_MODEL:-deepseek-chat}
      - APP__API_KEY=${APP_API_KEY:-}
      - APP__ASYNC_INGESTION=true
    volumes:
      - ../data:/app/data
    depends_on:
      mysql_cloud:
        condition: service_healthy
      redis_cloud:
        condition: service_started
      milvus_cloud:
        condition: service_started
    restart: unless-stopped

  # ARQ worker（热备，承接切换后的入库任务）
  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: ["arq", "src.orchestration.worker.config.WorkerSettings"]
    environment:
      - MYSQL__HOST=mysql_cloud
      - MYSQL__PORT=3306
      - MYSQL__USER=root
      - MYSQL__PASSWORD=${MYSQL_PASSWORD:?必须设置 MYSQL_PASSWORD 环境变量}
      - MYSQL__DATABASE=edu_rag
      - REDIS__HOST=redis_cloud
      - REDIS__PORT=6379
      - REDIS__PASSWORD=${REDIS_PASSWORD:?必须设置 REDIS_PASSWORD 环境变量}
      - VECTOR_STORE__MILVUS_HOST=milvus_cloud
      - VECTOR_STORE__MILVUS_PORT=19530
      - EMBEDDING__PROVIDER=api
      - EMBEDDING__API_BASE_URL=http://ollama_cloud:11434/v1
      - EMBEDDING__MODEL=bge-m3
      - EMBEDDING__API_KEY=ollama
      - LLM__API_KEY=${OPENAI_API_KEY}
      - APP__ASYNC_INGESTION=true
    volumes:
      - ../data:/app/data
    depends_on:
      mysql_cloud:
        condition: service_healthy
      redis_cloud:
        condition: service_started
      milvus_cloud:
        condition: service_started
    restart: unless-stopped

  # ── 云上 MySQL（作为本地主的从库，只读）──
  mysql_cloud:
    image: mysql:8.0
    ports:
      - "3308:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:?必须设置 MYSQL_PASSWORD 环境变量}
      MYSQL_DATABASE: edu_rag
    volumes:
      - mysql_cloud_data:/var/lib/mysql
      - ./mysql/slave.cnf:/etc/mysql/conf.d/slave.cnf:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    # 主从复制需手动执行：CHANGE MASTER TO MASTER_HOST='<本地主IP>', ...; START REPLICA;

  redis_cloud:
    image: redis:7-alpine
    ports:
      - "6381:6379"
    volumes:
      - redis_cloud_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:?必须设置 REDIS_PASSWORD 环境变量}
    restart: unless-stopped

  ollama_cloud:
    image: ollama/ollama:latest
    ports:
      - "11435:11434"
    volumes:
      - ollama_cloud_data:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=24h
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        ollama serve &
        sleep 5
        ollama pull bge-m3
        wait
    restart: unless-stopped

  # ── 云上 Milvus（独立 standalone，切换后承接向量检索）──
  etcd_cloud:
    image: quay.io/coreos/etcd:v3.5.5
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
    volumes:
      - etcd_cloud_data:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    restart: unless-stopped

  minio_cloud:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - minio_cloud_data:/minio_data
    command: minio server /minio_data
    restart: unless-stopped

  milvus_cloud:
    image: milvusdb/milvus:v2.4.10
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd_cloud:2379
      MINIO_ADDRESS: minio_cloud:9000
    volumes:
      - milvus_cloud_data:/var/lib/milvus
    ports:
      - "19531:19530"
    depends_on:
      - etcd_cloud
      - minio_cloud
    restart: unless-stopped

volumes:
  mysql_cloud_data:
  redis_cloud_data:
  ollama_cloud_data:
  etcd_cloud_data:
  minio_cloud_data:
  milvus_cloud_data:
