# 本地验证 override（P-验证）：复用宿主机 Milvus/Ollama，避免端口冲突
# docker compose -f docker/docker-compose.yml -f docker/docker-compose.override.yml up -d
# 宿主机已有：milvus-standalone(19530/9091) + ollama(11434) + 本地 MySQL(3306)
# 本 override 让 milvus/etcd/minio/ollama 默认不启动（profiles），app 连宿主机服务

services:
  # 用 profiles 让这些服务默认不启动（复用宿主机已运行的）
  etcd:
    profiles: ["full"]
  minio:
    profiles: ["full"]
  milvus:
    profiles: ["full"]
  ollama:
    profiles: ["full"]

  # MySQL 8.0 用 native_password，避免 cryptography 依赖（验证环境快速方案）
  mysql:
    command: --default-authentication-plugin=mysql_native_password

  # app 连宿主机的 Milvus/Ollama（host.docker.internal 在 Windows/Mac 可用）
  app:
    environment:
      - VECTOR_STORE__MILVUS_HOST=host.docker.internal
      - VECTOR_STORE__MILVUS_PORT=19530
      - EMBEDDING__API_BASE_URL=http://host.docker.internal:11434/v1
      - APP__ASYNC_INGESTION=true
    volumes:
      - ../src:/app/src
    depends_on: !override
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

  worker:
    environment:
      - VECTOR_STORE__MILVUS_HOST=host.docker.internal
      - VECTOR_STORE__MILVUS_PORT=19530
      - EMBEDDING__API_BASE_URL=http://host.docker.internal:11434/v1
      - APP__ASYNC_INGESTION=true
    volumes:
      - ../src:/app/src
    depends_on: !override
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
