# CI — E2E 测试（Playwright）
name: E2E Test

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    # 服务容器：MySQL + Redis
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ci_e2e_pass
          MYSQL_DATABASE: edu_rag
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      MYSQL__HOST: 127.0.0.1
      MYSQL__PORT: 3306
      MYSQL__USER: root
      MYSQL__PASSWORD: ci_e2e_pass
      MYSQL__DATABASE: edu_rag
      REDIS__HOST: 127.0.0.1
      REDIS__PORT: 6379
      LLM__API_KEY: sk-ci-e2e-placeholder
      LLM__BASE_URL: http://localhost:11434/v1
      EMBEDDING__PROVIDER: api
      EMBEDDING__API_BASE_URL: http://localhost:11434/v1
      VECTOR_STORE__PROVIDER: chroma
      APP__DEBUG: "true"
      E2E_BASE_URL: http://localhost:8000

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Install Playwright browsers
        run: cd frontend && npx playwright install --with-deps chromium

      - name: Run database migrations
        run: alembic upgrade head

      - name: Build frontend
        run: cd frontend && npm run build

      - name: Start backend (SPA mode)
        run: |
          uvicorn src.orchestration.app:app --host 0.0.0.0 --port 8000 &
          sleep 5
          curl -s http://localhost:8000/health || exit 1

      - name: Run E2E tests
        run: cd frontend && npm run e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 30

      - name: Upload Playwright traces
        uses: actions/upload-artifact@v4
        if: ${{ failure() }}
        with:
          name: playwright-traces
          path: frontend/test-results/
          retention-days: 7
