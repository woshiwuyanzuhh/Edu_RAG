<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}edu_rag - 智能题库系统{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    {% block extra_head %}{% endblock %}
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">
                <i class="bi bi-book"></i> edu_rag 智能题库
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link {% if active_page == 'index' %}active{% endif %}" href="/">
                            <i class="bi bi-house"></i> 首页
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if active_page == 'knowledge' %}active{% endif %}" href="/knowledge">
                            <i class="bi bi-folder2"></i> 知识库
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if active_page == 'upload' %}active{% endif %}" href="/upload">
                            <i class="bi bi-cloud-upload"></i> 上传
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if active_page == 'qa' %}active{% endif %}" href="/qa">
                            <i class="bi bi-chat-dots"></i> 问答
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if active_page == 'exam' %}active{% endif %}" href="/exam">
                            <i class="bi bi-pencil-square"></i> 题库
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- 主内容 -->
    <main class="container py-4">
        {% block content %}{% endblock %}
    </main>

    <!-- 页脚 -->
    <footer class="text-center text-muted py-3 mt-5 border-top">
        <small>edu_rag - 基于 RAG 的智能教育题库系统</small>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="/static/js/app.js"></script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
